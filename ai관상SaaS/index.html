    <style>
      body {
        font-family: 'Noto Sans KR', sans-serif;
        background-color: #0f0f0f;
        color: #f3f4f6;
        margin: 0;
        padding: 0;
        height: 100vh;
        overflow: hidden; 
      }
      h1, h2, h3, .serif {
        font-family: 'Noto Serif KR', serif;
      }
      
      @media print {
        @page {
          size: 80mm 80mm; 
          margin: 0;
        }
        html, body {
          width: 80mm;
          height: 80mm;
          margin: 0 !important;
          padding: 0 !important;
          background: white !important;
        }
        body * { visibility: hidden; }
        #printable-area, #printable-area * { visibility: visible; }
        #printable-area {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          display: flex !important;
          flex-direction: column;
          align-items: center;
          background: white;
          color: black;
          z-index: 9999;
          padding: 2mm;
          box-sizing: border-box;
        }
      }
    </style>
